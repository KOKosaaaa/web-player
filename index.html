<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; media-src blob:; img-src 'self' data:;">
<title>Плеер</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap');

:root {
  --bg: #0b0b0f;
  --sf: #131318;
  --sf2: #1a1a22;
  --bd: #25252f;
  --ac: #6c5ce7;
  --ac2: #a29bfe;
  --ac-glow: rgba(108,92,231,.2);
  --tx: #e8e8f0;
  --tx2: #8888a0;
  --tx3: #55556a;
  --red: #ff6b6b;
  --grn: #51cf66;
  --org: #ffa94d;
  --radius: 10px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body { background:var(--bg); color:var(--tx); font-family:'Manrope',sans-serif; font-size:13px; }

.app { display:flex; flex-direction:column; height:100vh; }

/* ═══ HEADER ═══ */
.header {
  padding: 10px 16px;
  border-bottom: 1px solid var(--bd);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--sf);
  flex-shrink: 0;
  gap: 10px;
}
.logo {
  font-size: .95rem;
  font-weight: 800;
  letter-spacing: -.02em;
  background: linear-gradient(135deg, var(--ac), var(--ac2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  white-space: nowrap;
}
.header-btns { display:flex; gap:6px; flex-shrink:0; }
.hbtn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: .65rem;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid;
  white-space: nowrap;
  transition: all .15s;
  background: none;
  color: var(--tx);
}
.hbtn-add { border-color: var(--ac); color: var(--ac2); }
.hbtn-add:hover { background: var(--ac-glow); }
.hbtn-stop { border-color: rgba(255,107,107,.3); color: var(--red); }
.hbtn-stop:hover { background: rgba(255,107,107,.08); }
.hbtn-trim { border-color: rgba(81,207,102,.3); color: var(--grn); }
.hbtn-trim:hover { background: rgba(81,207,102,.08); }

/* ═══ MAIN ═══ */
.main { flex:1; display:flex; overflow:hidden; }
.main.editor-open .playlist { flex:1; }
.main.editor-open .editor-panel { flex:1.1; }

/* ═══ PLAYLIST ═══ */
.playlist { flex:1; overflow-y:auto; padding:8px; -webkit-overflow-scrolling:touch; }
.track-list { max-width:760px; margin:0 auto; }

/* Empty state */
.empty-state {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height: 60vh; gap: 16px; text-align:center;
}
.empty-icon {
  width:80px; height:80px; border-radius:50%;
  background: var(--sf2); border:2px dashed var(--bd);
  display:flex; align-items:center; justify-content:center;
  font-size:2rem; color:var(--tx3);
}
.empty-title { font-size:1rem; font-weight:700; color:var(--tx2); }
.empty-sub { font-size:.75rem; color:var(--tx3); max-width:280px; }

/* Track card */
.track {
  background: var(--sf);
  border: 1px solid var(--bd);
  border-radius: var(--radius);
  margin-bottom: 4px;
  overflow: hidden;
  transition: all .15s;
}
.track:hover { background: var(--sf2); }
.track.active {
  background: #12111e;
  border-color: var(--ac);
  box-shadow: 0 0 16px var(--ac-glow);
}
.track.paused {
  border-color: var(--org);
  box-shadow: 0 0 12px rgba(255,169,77,.12);
}

.track-main {
  display: flex;
  align-items: center;
  padding: 8px 10px;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.track-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: .6rem;
  font-weight: 600;
  color: var(--tx3);
  min-width: 20px; height:20px;
  display:flex; align-items:center; justify-content:center;
  border-radius: 5px;
  background: rgba(255,255,255,.03);
  flex-shrink: 0;
}
.track.active .track-num { color: var(--ac2); background: rgba(108,92,231,.1); }

.play-btn {
  width:30px; height:30px; border-radius:50%;
  border:1.5px solid var(--bd);
  background: rgba(255,255,255,.02);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; cursor:pointer; transition: all .12s;
}
.play-btn svg { width:11px; height:11px; fill:var(--tx3); }
.play-btn:hover svg { fill:var(--ac2); }
.track.active .play-btn { border-color:var(--ac); background:var(--ac); }
.track.active .play-btn svg { fill:#fff; }

.track-info { flex:1; min-width:0; }
.track-title {
  font-weight: 700; font-size: .75rem;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  line-height:1.3;
}
.track-desc {
  font-size: .6rem; color:var(--tx2);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}

/* Waveform bars */
.wave-bars { display:none; gap:2px; align-items:flex-end; height:12px; flex-shrink:0; }
.track.active .wave-bars { display:flex; }
.wave-bar {
  width:2.5px; border-radius:1px; background:var(--ac2);
  animation: wave .8s ease-in-out infinite;
}
.wave-bar:nth-child(1){height:4px}
.wave-bar:nth-child(2){height:10px;animation-delay:.15s}
.wave-bar:nth-child(3){height:6px;animation-delay:.3s}
.wave-bar:nth-child(4){height:12px;animation-delay:.1s}
@keyframes wave{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(1)}}

.track-time {
  font-family:'IBM Plex Mono',monospace;
  font-size:.6rem; color:var(--tx3);
  flex-shrink:0; text-align:right; min-width:36px;
}
.track.active .track-time { color:var(--ac2); }

/* Action buttons row */
.track-actions {
  display:flex; gap:3px; flex-shrink:0;
}
.ibtn {
  background:none; border:1px solid var(--bd); color:var(--tx3);
  font-size:.6rem; width:24px; height:24px; border-radius:6px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all .1s;
}
.ibtn:hover { border-color:var(--ac); color:var(--ac2); background:rgba(108,92,231,.06); }
.ibtn-up:hover, .ibtn-down:hover { border-color:var(--org); color:var(--org); background:rgba(255,169,77,.06); }
.ibtn-del:hover { border-color:var(--red); color:var(--red); background:rgba(255,107,107,.06); }
.ibtn-trim:hover { border-color:var(--grn); color:var(--grn); background:rgba(81,207,102,.06); }
.ibtn.active-trim { border-color:var(--grn); color:var(--grn); }

/* Progress bar */
.progress-wrap { padding:0 10px 4px; }
.progress-slider {
  -webkit-appearance:none; width:100%; height:4px;
  background:rgba(255,255,255,.08); border-radius:2px;
  outline:none; cursor:pointer;
}
.progress-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:14px; height:14px;
  background:#fff; border-radius:50%;
  box-shadow:0 0 6px var(--ac-glow); cursor:pointer; margin-top:-5px;
}
.progress-slider::-moz-range-thumb {
  width:14px; height:14px; background:#fff; border-radius:50%;
  box-shadow:0 0 6px var(--ac-glow); border:none; cursor:pointer;
}
.progress-slider::-webkit-slider-runnable-track {
  height:4px; background:linear-gradient(90deg,var(--ac),var(--ac2)); border-radius:2px;
}
.progress-slider::-moz-range-track { height:4px; background:rgba(255,255,255,.08); border-radius:2px; }
.progress-slider::-moz-range-progress { height:4px; background:linear-gradient(90deg,var(--ac),var(--ac2)); border-radius:2px; }

/* Controls row */
.track-controls {
  display:flex; align-items:center; padding:0 10px 6px; gap:0;
}
.skip-btn {
  font-family:'IBM Plex Mono',monospace; font-size:.55rem; font-weight:600;
  color:var(--tx3); background:rgba(255,255,255,.03); border:1px solid var(--bd);
  padding:2px 6px; border-radius:4px; cursor:pointer; transition:all .1s;
}
.skip-btn:hover { color:var(--ac2); border-color:var(--ac); }
.vol-slider {
  -webkit-appearance:none; width:60px; height:3px;
  background:rgba(255,255,255,.1); border-radius:2px; outline:none; cursor:pointer;
  margin-left:auto;
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:10px; height:10px;
  background:var(--ac2); border-radius:50%; cursor:pointer;
}
.vol-slider::-moz-range-thumb { width:10px; height:10px; background:var(--ac2); border-radius:50%; border:none; }
.fade-btn {
  font-family:'IBM Plex Mono',monospace; font-size:.55rem; font-weight:600;
  color:var(--tx3); background:rgba(255,255,255,.03); border:1px solid var(--bd);
  padding:2px 7px; border-radius:4px; cursor:pointer; margin-left:4px; transition:all .1s;
}
.fade-btn:hover { color:var(--org); border-color:var(--org); }
.reset-btn {
  font-size:.6rem; color:var(--tx3); background:rgba(255,255,255,.03);
  border:1px solid var(--bd); width:22px; height:22px; border-radius:4px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  margin-left:4px; transition:all .1s;
}
.reset-btn:hover { color:var(--red); border-color:var(--red); }

/* ═══ EDITOR PANEL ═══ */
.editor-panel {
  flex:0; width:0; overflow:hidden;
  border-left:1px solid var(--bd);
  background:var(--sf);
  display:flex; flex-direction:column;
  transition: flex .2s;
}
.editor-panel.open { flex:1.1; width:auto; overflow:visible; }

.editor-header {
  padding:8px 12px; border-bottom:1px solid var(--bd);
  display:flex; align-items:center; justify-content:space-between;
}
.editor-label {
  font-weight:700; font-size:.75rem;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.editor-header-btns { display:flex; gap:5px; }
.editor-btn-reset {
  font-family:'IBM Plex Mono',monospace; font-size:.55rem; font-weight:600;
  padding:4px 8px; border-radius:4px; cursor:pointer;
  border:1px solid var(--bd); background:none; color:var(--tx2); transition:all .1s;
}
.editor-btn-reset:hover { border-color:var(--ac); color:var(--ac2); }
.editor-btn-close {
  font-size:.75rem; padding:4px 8px; border-radius:4px; cursor:pointer;
  border:1px solid var(--bd); background:none; color:var(--tx2); transition:all .1s;
  line-height:1;
}
.editor-btn-close:hover { border-color:var(--red); color:var(--red); }

.editor-empty {
  flex:1; display:flex; align-items:center; justify-content:center;
  color:var(--tx3); font-size:.75rem;
}
.editor-body { display:none; flex-direction:column; flex:1; overflow:hidden; padding:8px 12px; gap:8px; }

/* Waveform area */
.wave-outer { flex:1; min-height:80px; display:flex; flex-direction:column; gap:2px; }
.wave-times-top { display:flex; justify-content:space-between; }
.wave-times-top span, .wave-times-bottom span {
  font-family:'IBM Plex Mono',monospace; font-size:.55rem; color:var(--tx3);
}
.wave-area {
  flex:1; position:relative; background:var(--bg);
  border:1px solid var(--bd); border-radius:6px; overflow:hidden; cursor:crosshair;
  min-height:60px;
}
.wave-area.zoomed { cursor:grab; }
.wave-inner { position:relative; width:100%; height:100%; }
.wave-canvas { position:absolute; top:0; left:0; height:100%; display:block; }
.dim-left, .dim-right { position:absolute; top:0; bottom:0; background:rgba(0,0,0,.55); pointer-events:none; }
.dim-left { left:0; }
.dim-right { right:0; }
.range-sel {
  position:absolute; top:0; bottom:0;
  border-top:2px solid var(--grn); border-bottom:2px solid var(--grn);
  pointer-events:none;
}
.handle-l, .handle-r {
  position:absolute; top:0; bottom:0; width:14px; cursor:ew-resize;
  pointer-events:all; z-index:2;
}
.handle-l { left:-7px; }
.handle-r { right:-7px; }
.handle-grip {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  display:flex; flex-direction:column; gap:2px;
}
.handle-grip i { display:block; width:2px; height:8px; background:var(--grn); border-radius:1px; }
.playhead {
  position:absolute; top:0; bottom:0; width:2px; background:var(--ac2);
  display:none; z-index:3; pointer-events:none;
}
.zoom-label {
  position:absolute; bottom:4px; right:6px;
  font-family:'IBM Plex Mono',monospace; font-size:.5rem; color:var(--tx3);
  pointer-events:none; z-index:4;
}
.wave-times-bottom { display:flex; justify-content:space-between; }
.wave-times-bottom span { color:var(--grn); }

/* Editor info + buttons */
.editor-range {
  text-align:center; font-family:'IBM Plex Mono',monospace;
}
.editor-range .t { font-size:.7rem; color:var(--tx); }
.editor-range .d { font-size:.6rem; color:var(--tx2); margin-top:2px; }
.editor-btns { display:flex; gap:5px; flex-wrap:wrap; }
.ebtn {
  font-family:'IBM Plex Mono',monospace; font-size:.6rem; font-weight:600;
  padding:6px 12px; border-radius:6px; cursor:pointer;
  border:1px solid var(--bd); background:none; color:var(--tx2);
  transition:all .12s; flex:1; min-width:0; white-space:nowrap;
}
.ebtn:hover { background:var(--sf2); }
.ebtn-play { border-color:rgba(108,92,231,.3); color:var(--ac2); }
.ebtn-play:hover { background:rgba(108,92,231,.08); }
.ebtn-sel { border-color:rgba(255,169,77,.3); color:var(--org); }
.ebtn-sel:hover { background:rgba(255,169,77,.08); }
.ebtn-stop { border-color:rgba(255,107,107,.3); color:var(--red); }
.ebtn-stop:hover { background:rgba(255,107,107,.08); }
.ebtn-apply { border-color:rgba(81,207,102,.3); color:var(--grn); }
.ebtn-apply:hover { background:rgba(81,207,102,.08); }

.editor-hint {
  font-size:.55rem; color:var(--tx3); text-align:center;
}

/* Responsive */
@media (max-width:700px) {
  .main.editor-open { flex-direction:column; }
  .main.editor-open .playlist { flex:1; max-height:45vh; }
  .main.editor-open .editor-panel.open { flex:1; border-left:none; border-top:1px solid var(--bd); }
}

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--bd); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--tx3); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">Плеер</div>
    <div class="header-btns">
      <button class="hbtn hbtn-add" onclick="addFiles()">+ Добавить</button>
      <button class="hbtn hbtn-stop" onclick="stopAll()">&#9209; Стоп</button>
      <button class="hbtn hbtn-trim" onclick="toggleEditor()">&#9986; Нарезка</button>
    </div>
  </div>
  <div class="main" id="main">
    <div class="playlist"><div class="track-list" id="trackList"></div></div>
    <div class="editor-panel" id="editorPanel">
      <div class="editor-header">
        <div class="editor-label" id="editorLabel">Нарезка</div>
        <div class="editor-header-btns">
          <button class="editor-btn-reset" onclick="editorReset()">&#8634; Сброс</button>
          <button class="editor-btn-close" onclick="toggleEditor()">&#10005;</button>
        </div>
      </div>
      <div class="editor-empty" id="editorEmpty">Нажмите &#9986; рядом с треком</div>
      <div class="editor-body" id="editorBody">
        <div class="wave-outer">
          <div class="wave-times-top"><span id="wtl">00:00.0</span><span id="wtr">00:00.0</span></div>
          <div class="wave-area" id="waveArea">
            <div class="wave-inner" id="waveInner">
              <canvas class="wave-canvas" id="waveCanvas"></canvas>
              <div class="dim-left" id="dimL" style="width:0"></div>
              <div class="dim-right" id="dimR" style="width:0"></div>
              <div class="range-sel" id="rangeSel" style="left:0;width:100%">
                <div class="handle-l" id="handleL"><div class="handle-grip"><i></i><i></i><i></i></div></div>
                <div class="handle-r" id="handleR"><div class="handle-grip"><i></i><i></i><i></i></div></div>
              </div>
              <div class="playhead" id="playhead"></div>
            </div>
            <div class="zoom-label" id="zoomLabel">x1.0</div>
          </div>
          <div class="wave-times-bottom"><span id="wbl">00:00.0</span><span id="wbr">00:00.0</span></div>
        </div>
        <div class="editor-range">
          <div class="t"><span id="edStart">00:00.0</span> &mdash; <span id="edEnd">00:00.0</span></div>
          <div class="d">Длительность: <span id="edDur">00:00.0</span></div>
        </div>
        <div class="editor-btns">
          <button class="ebtn ebtn-play" onclick="edPlayAll()">&#9654; Весь</button>
          <button class="ebtn ebtn-sel" onclick="edPlaySel()">&#9654; Выделение</button>
          <button class="ebtn ebtn-sel" onclick="edPlayPreview()">&#9654; Превью</button>
          <button class="ebtn ebtn-stop" onclick="edStop()">&#9632; Стоп</button>
          <button class="ebtn ebtn-apply" onclick="edApply()">&#10003; Применить</button>
        </div>
        <div class="editor-hint">Тяните зелёные ручки &#8596; для выделения | Колёсико — зум</div>
      </div>
    </div>
  </div>
</div>
<input type="file" id="filePicker" accept="audio/*" multiple style="display:none">

<script>
// ═══════════════════════════════
//  DATA
// ═══════════════════════════════
const playIcon = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
const pauseIcon = `<svg viewBox="0 0 24 24"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>`;

const MAX_FILE_SIZE = 300 * 1024 * 1024; // 300 МБ макс на файл
const ALLOWED_AUDIO_TYPES = ['audio/mpeg','audio/wav','audio/ogg','audio/flac','audio/aac','audio/mp4','audio/webm','audio/x-m4a'];

let tracks = []; // {id, title, src (objectURL), blob}
let audioCache = {};
let currentAudio = null, currentEl = null, currentIdx = null, animFrame = null;
let nextId = 1;
let playLock = false; // защита от гонки состояний

// ═══════════════════════════════
//  UTILS
// ═══════════════════════════════
// Санитизация строки для безопасной вставки в HTML
function esc(s) {
  if (typeof s !== 'string') return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Безопасное освобождение Object URL
function safeRevoke(url) {
  if (url && typeof url === 'string' && url.startsWith('blob:')) {
    try { URL.revokeObjectURL(url); } catch(e) {}
  }
}

// Валидация индекса трека
function validIdx(i) { return Number.isInteger(i) && i >= 0 && i < tracks.length; }

// ═══════════════════════════════
//  ADD FILES
// ═══════════════════════════════
function addFiles() { document.getElementById('filePicker').click(); }

document.getElementById('filePicker').addEventListener('change', function() {
  let skipped = [];
  Array.from(this.files).forEach(file => {
    // Проверка типа файла
    if (!file.type.startsWith('audio/') && !ALLOWED_AUDIO_TYPES.includes(file.type)) {
      skipped.push(file.name + ' (не аудио)');
      return;
    }
    // Проверка размера
    if (file.size > MAX_FILE_SIZE) {
      skipped.push(file.name + ' (>' + Math.round(MAX_FILE_SIZE/1024/1024) + ' МБ)');
      return;
    }
    if (file.size === 0) {
      skipped.push(file.name + ' (пустой файл)');
      return;
    }
    const url = URL.createObjectURL(file);
    const title = file.name.replace(/\.[^.]+$/, '');
    console.log('[Add]', title, '— тип:', file.type, 'размер:', file.size);
    tracks.push({ id: nextId++, title, src: url, blob: file });
  });
  this.value = '';
  if (skipped.length) alert('Пропущены файлы:\n' + skipped.join('\n'));
  render();
  saveToDB();
});

// ═══════════════════════════════
//  RENDER
// ═══════════════════════════════
function render() {
  const el = document.getElementById('trackList');
  if (tracks.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">&#9835;</div>
        <div class="empty-title">Плейлист пуст</div>
        <div class="empty-sub">Нажмите «+ Добавить» чтобы загрузить музыку с устройства</div>
      </div>`;
    return;
  }
  let h = '';
  tracks.forEach((t, i) => {
    const safeTitle = esc(t.title);
    h += `<div class="track" id="t${i}">
      <div class="track-main" onclick="play(${i})">
        <div class="track-num">${i + 1}</div>
        <div class="play-btn" id="pb${i}">${playIcon}</div>
        <div class="track-info">
          <div class="track-title">${safeTitle}</div>
        </div>
        <div class="wave-bars"><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div></div>
        <div class="track-time" id="tm${i}">--:--</div>
        <div class="track-actions">
          <div class="ibtn ibtn-up" onclick="event.stopPropagation();moveTrack(${i},-1)" title="Вверх">&#9650;</div>
          <div class="ibtn ibtn-down" onclick="event.stopPropagation();moveTrack(${i},1)" title="Вниз">&#9660;</div>
          <div class="ibtn ibtn-trim" onclick="event.stopPropagation();openEditor(${i})" title="Нарезка">&#9986;</div>
          <div class="ibtn ibtn-del" onclick="event.stopPropagation();removeTrack(${i})" title="Удалить">&#10005;</div>
        </div>
      </div>
      <div class="progress-wrap">
        <input type="range" class="progress-slider" id="ps${i}" min="0" max="1000" value="0" step="1">
      </div>
      <div class="track-controls">
        <div class="skip-btn" onclick="event.stopPropagation();seek(${i},-10)">-10</div>
        <div class="skip-btn" onclick="event.stopPropagation();seek(${i},-5)">-5</div>
        <div class="skip-btn" onclick="event.stopPropagation();seek(${i},5)">+5</div>
        <div class="skip-btn" onclick="event.stopPropagation();seek(${i},10)">+10</div>
        <input type="range" class="vol-slider" min="0" max="100" value="100" oninput="setVol(${i},this.value)">
        <div class="fade-btn" onclick="event.stopPropagation();fadeOut(${i})" title="Плавное затухание">Fade</div>
        <div class="reset-btn" onclick="event.stopPropagation();resetTrack(${i})" title="В начало">&#9198;</div>
      </div>
    </div>`;
  });
  el.innerHTML = h;

  // Bind sliders
  document.querySelectorAll('.progress-slider').forEach(s => {
    const i = +s.id.replace('ps', '');
    s.addEventListener('input', e => {
      if (!validIdx(i)) return;
      const a = getAudio(i);
      if (a && a.duration && isFinite(a.duration)) a.currentTime = (e.target.value / 1000) * a.duration;
    });
  });

  // Re-apply active state
  if (currentIdx !== null && validIdx(currentIdx)) {
    const te = document.getElementById('t' + currentIdx);
    if (te) {
      const a = audioCache[tracks[currentIdx].id];
      if (a && !a.paused) te.classList.add('active');
      else if (a && a.paused && a.currentTime > 0) { te.classList.add('active', 'paused'); }
    }
  }

  // Load durations
  tracks.forEach((t, i) => { getAudio(i); });
}

// ═══════════════════════════════
//  AUDIO CACHE
// ═══════════════════════════════
function getAudio(i) {
  if (!validIdx(i)) return null;
  const t = tracks[i];
  if (!audioCache[t.id]) {
    const a = new Audio(t.src);
    a.preload = 'auto';
    a.addEventListener('loadedmetadata', () => {
      const el = document.getElementById('tm' + i);
      if (el && el.textContent === '--:--' && isFinite(a.duration)) el.textContent = fmtShort(a.duration);
    });
    a.addEventListener('ended', () => onEnded(i));
    a.addEventListener('error', () => {
      console.warn('Ошибка загрузки аудио для трека', t.title);
    });
    audioCache[t.id] = a;
  }
  return audioCache[t.id];
}

// ═══════════════════════════════
//  PLAYBACK
// ═══════════════════════════════
function play(i) {
  if (!validIdx(i) || playLock) return;
  playLock = true;
  try {
    const t = tracks[i];
    const a = getAudio(i);
    const el = document.getElementById('t' + i);
    if (!a || !el) { playLock = false; return; }

    // Stop previous if different
    if (currentAudio && currentAudio !== a) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
      if (currentEl && currentIdx !== null) {
        currentEl.classList.remove('active', 'paused');
        const pbEl = document.getElementById('pb' + currentIdx);
        if (pbEl) pbEl.innerHTML = playIcon;
        const psEl = document.getElementById('ps' + currentIdx);
        if (psEl) psEl.value = 0;
        if (currentAudio.duration && isFinite(currentAudio.duration)) {
          const tmEl = document.getElementById('tm' + currentIdx);
          if (tmEl) tmEl.textContent = fmtShort(currentAudio.duration);
        }
      }
      cancelAnimationFrame(animFrame);
    }

    if (a.paused) {
      a.play().catch(err => console.warn('Play error:', err));
      el.classList.remove('paused');
      el.classList.add('active');
      document.getElementById('pb' + i).innerHTML = pauseIcon;
      currentAudio = a; currentEl = el; currentIdx = i;
      animate(i);
    } else {
      a.pause();
      el.classList.add('paused');
      document.getElementById('pb' + i).innerHTML = playIcon;
      cancelAnimationFrame(animFrame);
    }
  } finally {
    playLock = false;
  }
}

function animate(i) {
  if (!validIdx(i)) return;
  const a = getAudio(i);
  if (!a || a.paused || a.ended) return;
  const p = document.getElementById('ps' + i);
  const tm = document.getElementById('tm' + i);
  if (p && a.duration && isFinite(a.duration)) p.value = (a.currentTime / a.duration) * 1000;
  if (tm && a.duration && isFinite(a.duration)) tm.textContent = fmtShort(a.duration - a.currentTime);
  animFrame = requestAnimationFrame(() => animate(i));
}

function onEnded(i) {
  const el = document.getElementById('t' + i);
  if (el) el.classList.remove('active', 'paused');
  const pb = document.getElementById('pb' + i);
  if (pb) pb.innerHTML = playIcon;
  const ps = document.getElementById('ps' + i);
  if (ps) ps.value = 0;
  cancelAnimationFrame(animFrame);
  currentAudio = null; currentEl = null; currentIdx = null;
}

function stopAll() {
  Object.values(audioCache).forEach(a => { a.pause(); a.currentTime = 0; });
  document.querySelectorAll('.track').forEach(e => e.classList.remove('active', 'paused'));
  document.querySelectorAll('[id^="pb"]').forEach(b => { if (/^pb\d+$/.test(b.id)) b.innerHTML = playIcon; });
  document.querySelectorAll('.progress-slider').forEach(p => p.value = 0);
  cancelAnimationFrame(animFrame);
  if (fadeInterval) { clearInterval(fadeInterval); fadeInterval = null; }
  currentAudio = null; currentEl = null; currentIdx = null;
}

function seek(i, sec) {
  if (!validIdx(i)) return;
  const a = getAudio(i);
  if (a && a.duration && isFinite(a.duration)) a.currentTime = Math.max(0, Math.min(a.duration, a.currentTime + sec));
}
function setVol(i, v) { if (!validIdx(i)) return; const a = getAudio(i); if (a) a.volume = Math.max(0, Math.min(1, v / 100)); }
function resetTrack(i) {
  if (!validIdx(i)) return;
  const a = getAudio(i);
  if (!a) return;
  const p = document.getElementById('ps' + i);
  if (p) p.value = 0;
  if (a.readyState > 0) a.currentTime = 0;
}

// ═══════════════════════════════
//  FADE OUT
// ═══════════════════════════════
let fadeInterval = null;
function fadeOut(i) {
  if (!validIdx(i)) return;
  const a = getAudio(i);
  if (!a || a.paused || fadeInterval) return;
  const startVol = a.volume, steps = 40, stepTime = 50;
  let step = 0;
  fadeInterval = setInterval(() => {
    step++;
    a.volume = Math.max(0, startVol * (1 - step / steps));
    if (step >= steps) {
      clearInterval(fadeInterval); fadeInterval = null;
      a.pause(); a.currentTime = 0; a.volume = startVol;
      onEnded(i);
    }
  }, stepTime);
}

// ═══════════════════════════════
//  MOVE / REMOVE
// ═══════════════════════════════
function moveTrack(i, dir) {
  const j = i + dir;
  if (!validIdx(i) || !validIdx(j)) return;
  let wasActive = currentIdx;
  [tracks[i], tracks[j]] = [tracks[j], tracks[i]];
  if (wasActive === i) currentIdx = j;
  else if (wasActive === j) currentIdx = i;
  render();
  saveToDB();
}

function removeTrack(i) {
  if (!validIdx(i)) return;
  const t = tracks[i];
  // Освобождаем Object URL
  safeRevoke(t.src);
  if (audioCache[t.id]) { audioCache[t.id].pause(); delete audioCache[t.id]; }
  if (currentIdx === i) { currentAudio = null; currentEl = null; currentIdx = null; cancelAnimationFrame(animFrame); }
  else if (currentIdx !== null && currentIdx > i) currentIdx--;
  // Инвалидируем редактор если открыт для этого трека
  if (eI === i) { eI = null; eB = null; if (eA) { eA.pause(); eA = null; }
    document.getElementById('editorBody').style.display = 'none';
    document.getElementById('editorEmpty').style.display = 'flex';
  } else if (eI !== null && eI > i) { eI--; }
  tracks.splice(i, 1);
  render();
  saveToDB();
}

// ═══════════════════════════════
//  FORMAT
// ═══════════════════════════════
function fmtShort(s) {
  if (!isFinite(s) || s < 0) return '0:00';
  const m = Math.floor(s / 60), c = Math.floor(s % 60);
  return m + ':' + (c < 10 ? '0' : '') + c;
}
function fmtLong(s) {
  if (!isFinite(s) || s < 0) return '00:00.0';
  const m = Math.floor(s / 60), c = (s % 60).toFixed(1);
  return (m < 10 ? '0' : '') + m + ':' + (c < 10 ? '0' : '') + c;
}


// ═══════════════════════════════
//  EDITOR — скопировано из оригинального пульта
// ═══════════════════════════════
let editorOpen = false;
function toggleEditor() {
  editorOpen = !editorOpen;
  document.getElementById('editorPanel').classList.toggle('open', editorOpen);
  document.getElementById('main').classList.toggle('editor-open', editorOpen);
}

let eB=null,eI=null,eA=null,eAI=null,eS=0,eE=0,eD=0;
let zoomLvl=1,zoomOff=0;

function openEditor(i){
  if(!validIdx(i))return;
  if(!editorOpen)toggleEditor();
  document.querySelectorAll('.ibtn-trim').forEach(b=>b.classList.remove('active-trim'));
  const btn=document.querySelector('#t'+i+' .ibtn-trim');if(btn)btn.classList.add('active-trim');
  document.getElementById('editorEmpty').style.display='none';
  document.getElementById('editorBody').style.display='flex';
  const t=tracks[i];document.getElementById('editorLabel').textContent=t.title;
  eI=i;eS=0;eE=0;eD=0;zoomLvl=1;zoomOff=0;
  if(eA){eA.pause();eA=null}
  edOrigSrc=t.src;
  eA=new Audio(t.src);eA.preload='auto';
  const ax=new(window.AudioContext||window.webkitAudioContext)();
  // Всегда декодируем оригинал, чтобы можно было вырезать любой кусок
  const srcBlob=t.originalBlob||t.blob;
  const reader=new FileReader();
  reader.onload=function(){ax.decodeAudioData(reader.result,function(d){
    eB=d;eD=d.duration;eE=eD;dW(d);ax.close()},function(e){
    console.error('decodeAudioData error:',e);alert('Не удалось декодировать аудио');ax.close()})};
  reader.readAsArrayBuffer(srcBlob);
}
function dW(b){
  const waEl=document.getElementById('waveArea');
  const baseW=waEl.clientWidth,h=waEl.clientHeight;
  if(baseW<=0||h<=0)return;
  // Ограничиваем offset чтобы не уехать за пределы трека
  const maxOff=Math.max(0,1-1/zoomLvl);
  zoomOff=Math.max(0,Math.min(maxOff,zoomOff));
  // Inner НЕ растёт — остаётся 100%
  const cv=document.getElementById('waveCanvas');
  cv.width=baseW*2;cv.height=h*2;
  cv.style.width=baseW+'px';cv.style.left='0px';
  const c=cv.getContext('2d');
  if(!c)return;
  c.scale(2,2);
  // Видимый диапазон трека: [zoomOff .. zoomOff + 1/zoomLvl]
  const visStart=zoomOff;
  const visEnd=Math.min(1,zoomOff+1/zoomLvl);
  const d=b.getChannelData(0),total=d.length;
  const sStart=Math.floor(visStart*total);
  const sEnd=Math.min(total,Math.ceil(visEnd*total));
  const visSamples=sEnd-sStart;
  const bars=baseW*2;
  if(bars<=0||visSamples<=0)return;
  const st=Math.max(1,Math.floor(visSamples/bars)),mid=h/2;
  c.clearRect(0,0,baseW,h);
  for(let x=0;x<bars;x++){let mn=0,mx=0;const s=sStart+x*st;
  for(let j=0;j<st;j+=3){const v=d[s+j]||0;if(v<mn)mn=v;if(v>mx)mx=v}
  const bh=Math.max(.5,(mx-mn)*mid*.45);const alpha=.3+Math.min(.6,bh/mid*2);
  c.fillStyle='rgba(108,92,231,'+alpha+')';c.fillRect(x*baseW/bars,mid-bh,Math.max(.5,baseW/bars*.5),bh*2)}
  document.getElementById('zoomLabel').textContent='x'+zoomLvl.toFixed(1);
  waEl.classList.toggle('zoomed',zoomLvl>1);
  uEd();
}
function uEd(){
  if(eD<=0)return;
  const waEl=document.getElementById('waveArea');
  const baseW=waEl.clientWidth;
  if(baseW<=0)return;
  // Конвертация: доля трека → пиксель в видимой области
  function f2px(f){return(f-zoomOff)*zoomLvl*baseW}
  const leftPx=f2px(eS/eD);
  const rightPx=f2px(eE/eD);
  const sel=document.getElementById('rangeSel');
  sel.style.left=leftPx+'px';sel.style.width=(rightPx-leftPx)+'px';
  document.getElementById('dimL').style.width=Math.max(0,leftPx)+'px';
  const dimR=document.getElementById('dimR');
  dimR.style.left=rightPx+'px';dimR.style.right='auto';dimR.style.width=Math.max(0,baseW-rightPx)+'px';
  // Playhead тоже в пикселях
  document.getElementById('wtl').textContent=fmtLong(0);document.getElementById('wtr').textContent=fmtLong(eD);
  document.getElementById('wbl').textContent=fmtLong(eS);document.getElementById('wbr').textContent=fmtLong(eE);
  document.getElementById('edStart').textContent=fmtLong(eS);document.getElementById('edEnd').textContent=fmtLong(eE);
  document.getElementById('edDur').textContent=fmtLong(eE-eS);
}
function setupEditorHandles(){
  const area=document.getElementById('waveArea');
  area.addEventListener('wheel',e=>{
    if(!eB)return;e.preventDefault();
    const rc=area.getBoundingClientRect();
    const mouseX=e.clientX-rc.left;
    const baseW=rc.width;
    const oldZ=zoomLvl;
    if(e.deltaY<0)zoomLvl=Math.min(40,zoomLvl*1.25);
    else zoomLvl=Math.max(1,zoomLvl/1.25);
    const trackFrac=(zoomOff*baseW*oldZ+mouseX)/(baseW*oldZ);
    zoomOff=(trackFrac*baseW*zoomLvl-mouseX)/(baseW*zoomLvl);
    dW(eB);
  },{passive:false});

  let lastTouchDist=0,lastTouchCenter=0;
  area.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      lastTouchDist=Math.sqrt(dx*dx+dy*dy);
      lastTouchCenter=(e.touches[0].clientX+e.touches[1].clientX)/2;
    }
  },{passive:true});
  area.addEventListener('touchmove',e=>{
    if(e.touches.length===2&&eB){
      e.preventDefault();
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const center=(e.touches[0].clientX+e.touches[1].clientX)/2;
      const rc=area.getBoundingClientRect();
      const mouseX=center-rc.left;
      const baseW=rc.width;
      const oldZ=zoomLvl;
      const scale=dist/lastTouchDist;
      zoomLvl=Math.max(1,Math.min(40,zoomLvl*scale));
      const trackFrac=(zoomOff*baseW*oldZ+mouseX)/(baseW*oldZ);
      zoomOff=(trackFrac*baseW*zoomLvl-mouseX)/(baseW*zoomLvl);
      lastTouchDist=dist;lastTouchCenter=center;
      dW(eB);
    }
  },{passive:false});

  function mk(h,side){
    function st(e){e.preventDefault();e.stopPropagation();
      const move=ev=>{ev.preventDefault();
        const rc=area.getBoundingClientRect();const cx=ev.touches?ev.touches[0].clientX:ev.clientX;
        const baseW=rc.width;
        const frac=(zoomOff*baseW*zoomLvl+(cx-rc.left))/(baseW*zoomLvl);
        let t=Math.max(0,Math.min(eD,frac*eD));
        if(side==='l'){eS=Math.max(0,Math.min(t,eE-.05))}else{eE=Math.min(eD,Math.max(t,eS+.05))}uEd()};
      const up=()=>{document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);document.removeEventListener('touchmove',move);document.removeEventListener('touchend',up)};
      document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);document.addEventListener('touchmove',move,{passive:false});document.addEventListener('touchend',up)}
    h.addEventListener('mousedown',st);h.addEventListener('touchstart',st,{passive:false})}
  mk(document.getElementById('handleL'),'l');mk(document.getElementById('handleR'),'r');

  let panStart=null,panStartOff=0,panMoved=false;
  area.addEventListener('mousedown',e=>{
    if(!eB||e.target.closest('.handle-l,.handle-r')||zoomLvl<=1)return;
    panStart=e.clientX;panStartOff=zoomOff;panMoved=false;
    area.style.cursor='grabbing';
    const mv=ev=>{
      const dx=ev.clientX-panStart;
      if(Math.abs(dx)>3)panMoved=true;
      const baseW=area.getBoundingClientRect().width;
      zoomOff=panStartOff-dx/(baseW*zoomLvl);
      dW(eB);
    };
    const up=()=>{area.style.cursor='crosshair';document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);panStart=null};
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
  });
  area.addEventListener('click',e=>{
    if(!eB||e.target.closest('.handle-l,.handle-r')||panMoved)return;
    const rc=area.getBoundingClientRect();const baseW=rc.width;
    const frac=(zoomOff*baseW*zoomLvl+(e.clientX-rc.left))/(baseW*zoomLvl);
    if(eA)eA.currentTime=Math.max(0,Math.min(eD,frac*eD))});

  let touchPanId=null,touchPanX=0,touchPanOff=0,touchPanMoved=false;
  area.addEventListener('touchstart',e=>{
    if(!eB||e.touches.length===1&&!e.target.closest('.handle-l,.handle-r')&&zoomLvl>1){
      touchPanId=e.touches[0].identifier;touchPanX=e.touches[0].clientX;touchPanOff=zoomOff;touchPanMoved=false;
    }
  },{passive:true});
  area.addEventListener('touchmove',e=>{
    if(e.touches.length===1&&touchPanId!==null&&zoomLvl>1){
      const t=Array.from(e.touches).find(t=>t.identifier===touchPanId);
      if(!t)return;
      const dx=t.clientX-touchPanX;
      if(Math.abs(dx)>3){touchPanMoved=true;e.preventDefault()}
      const baseW=area.getBoundingClientRect().width;
      zoomOff=touchPanOff-dx/(baseW*zoomLvl);
      dW(eB);
    }
  },{passive:false});
  area.addEventListener('touchend',()=>{touchPanId=null});
}

function editorReset(){if(!eB)return;eS=0;eE=eD;zoomLvl=1;zoomOff=0;dW(eB)}

function edAnimateLoop(stopAt){
  const p=document.getElementById('playhead');p.style.display='block';cancelAnimationFrame(eAI);
  (function s(){if(!eA||eA.paused||eA.ended||(stopAt&&eA.currentTime>=stopAt)){if(eA)eA.pause();p.style.display='none';return}
  var bw=document.getElementById('waveArea').clientWidth;
  p.style.left=((eA.currentTime/eD-zoomOff)*zoomLvl*bw)+'px';eAI=requestAnimationFrame(s)})();
}
let edOrigSrc=null; // оригинальный src трека для восстановления после превью
function edPlayAll(){
  if(!eB||eI===null)return;
  // Восстановить оригинальный аудио если было превью
  if(edOrigSrc){eA=new Audio(edOrigSrc);eA.preload='auto'}
  if(!eA)return;
  eA.currentTime=0;eA.play();edAnimateLoop(null);
}
function edPlaySel(){
  if(!eB||eE<=eS||eI===null)return;
  if(edOrigSrc){eA=new Audio(edOrigSrc);eA.preload='auto'}
  if(!eA)return;
  eA.currentTime=eS;eA.play();edAnimateLoop(eE);
}
function edStop(){if(eA){eA.pause();eA.currentTime=0}document.getElementById('playhead').style.display='none';cancelAnimationFrame(eAI)}

let previewUrl=null;
function edPlayPreview(){
  if(!eB||eE<=eS)return;
  const sr=eB.sampleRate,ch=eB.numberOfChannels,s0=Math.floor(eS*sr),s1=Math.floor(eE*sr),ln=s1-s0;
  if(ln<=0)return;
  const ofx=new OfflineAudioContext(ch,ln,sr),nb=ofx.createBuffer(ch,ln,sr);
  for(let c=0;c<ch;c++){const s=eB.getChannelData(c),d=nb.getChannelData(c);for(let j=0;j<ln;j++)d[j]=s[s0+j]}
  const src2=ofx.createBufferSource();src2.buffer=nb;src2.connect(ofx.destination);src2.start();
  ofx.startRendering().then(rendered=>{
    const wav=toWav(rendered),bl=new Blob([wav],{type:'audio/wav'});
    if(previewUrl)URL.revokeObjectURL(previewUrl);
    previewUrl=URL.createObjectURL(bl);
    if(eA)eA.pause();
    eA=new Audio(previewUrl);eA.play();
    const p=document.getElementById('playhead');p.style.display='block';cancelAnimationFrame(eAI);
    const selDur=eE-eS;
    if(selDur<=0)return;
    (function s(){if(!eA||eA.paused||eA.ended){p.style.display='none';return}
    const pct=eS/eD+(eA.currentTime/selDur)*((eE-eS)/eD);
    var bw2=document.getElementById('waveArea').clientWidth;
    p.style.left=((pct-zoomOff)*zoomLvl*bw2)+'px';eAI=requestAnimationFrame(s)})();
  });
}

let applyLock=false;
function edApply(){
  if(applyLock)return;
  if(!eB||eE<=eS){alert('Выделите область');return}
  if(eI===null||!validIdx(eI)){alert('Трек не найден');return}
  applyLock=true;
  const sr=eB.sampleRate,ch=eB.numberOfChannels,s0=Math.floor(eS*sr),s1=Math.floor(eE*sr),ln=s1-s0;
  if(ln<=0){applyLock=false;return}
  const of2=new OfflineAudioContext(ch,ln,sr),nb=of2.createBuffer(ch,ln,sr);
  for(let c=0;c<ch;c++){const s=eB.getChannelData(c),d=nb.getChannelData(c);for(let j=0;j<ln;j++)d[j]=s[s0+j]}
  const src=of2.createBufferSource();src.buffer=nb;src.connect(of2.destination);src.start();
  of2.startRendering().then(r=>{
    const w=toWav(r),bl=new Blob([w],{type:'audio/wav'}),u=URL.createObjectURL(bl);
    const t=tracks[eI];
    // Сохраняем оригинал (только первый раз)
    if(!t.originalBlob)t.originalBlob=t.blob;
    // Заменяем воспроизведение на обрезку
    safeRevoke(t.src);
    t.src=u;t.blob=bl;
    if(audioCache[t.id]){audioCache[t.id].pause();delete audioCache[t.id]}
    getAudio(eI);
    var tmEl=document.getElementById('tm'+eI);if(tmEl)tmEl.textContent='--:--';
    render();saveToDB();
    applyLock=false;
    alert('Трек заменён на фрагмент '+fmtLong(eS)+' \u2013 '+fmtLong(eE)+'\nОригинал сохранён — можно вырезать другой кусок');
  }).catch(function(){applyLock=false});
}

function toWav(b){const ch=b.numberOfChannels,sr=b.sampleRate,ln=b.length,o=new ArrayBuffer(44+ln*ch*2),v=new DataView(o);function w(p,s){for(let i=0;i<s.length;i++)v.setUint8(p+i,s.charCodeAt(i))}w(0,'RIFF');v.setUint32(4,36+ln*ch*2,true);w(8,'WAVE');w(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,ch,true);v.setUint32(24,sr,true);v.setUint32(28,sr*ch*2,true);v.setUint16(32,ch*2,true);v.setUint16(34,16,true);w(36,'data');v.setUint32(40,ln*ch*2,true);let of3=44;for(let i=0;i<ln;i++)for(let c=0;c<ch;c++){let x=Math.max(-1,Math.min(1,b.getChannelData(c)[i]));v.setInt16(of3,x<0?x*0x8000:x*0x7FFF,true);of3+=2}return o}


// ═══════════════════════════════
//  IndexedDB persistence
// ═══════════════════════════════
function dbOpen() {
  return new Promise((ok, fail) => {
    if (!window.indexedDB) { fail(new Error('IndexedDB не поддерживается')); return; }
    const r = indexedDB.open('playerDB', 1);
    r.onupgradeneeded = () => { r.result.createObjectStore('tracks'); };
    r.onsuccess = () => ok(r.result);
    r.onerror = () => fail(r.error);
  });
}
function saveToDB() {
  dbOpen().then(db => {
    const tx = db.transaction('tracks', 'readwrite');
    const store = tx.objectStore('tracks');
    store.clear();
    const saveData = tracks.map(t => ({ id: t.id, title: t.title, blob: t.blob, originalBlob: t.originalBlob||null, mime: t.blob && t.blob.type ? t.blob.type : 'audio/mpeg' }));
    store.put(saveData, 'playlist');
    tx.oncomplete = () => db.close();
    tx.onerror = () => { console.warn('IDB save error:', tx.error); db.close(); };
  }).catch(err => console.warn('IDB open error on save:', err));
}
function loadFromDB() {
  dbOpen().then(db => {
    const tx = db.transaction('tracks', 'readonly');
    const req = tx.objectStore('tracks').get('playlist');
    req.onsuccess = () => {
      db.close();
      const data = req.result;
      if (!data || !Array.isArray(data) || !data.length) { render(); return; }
      data.forEach(item => {
        // Валидация загруженных данных
        if (!item || !item.blob || typeof item.title !== 'string') return;
        try {
          let blob = item.blob;
          // Восстанавливаем MIME-тип если потерялся при хранении в IDB
          if (!blob.type && item.mime) {
            blob = new Blob([blob], { type: item.mime });
          }
          console.log('[IDB Load]', item.title, '— blob:', blob.constructor.name, blob.size, 'байт, тип:', blob.type);
          const url = URL.createObjectURL(blob);
          const track = { id: nextId++, title: item.title, src: url, blob: blob };
          if(item.originalBlob)track.originalBlob=item.originalBlob;
          tracks.push(track);
        } catch(e) { console.warn('Ошибка восстановления трека:', item.title, e); }
      });
      render();
    };
    req.onerror = () => { db.close(); render(); };
  }).catch(err => { console.warn('IDB open error on load:', err); render(); });
}

// ═══════════════════════════════
//  INIT
// ═══════════════════════════════
loadFromDB();
setupEditorHandles();
